id: io.github.db_mobile.resonance
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.node22
  - org.freedesktop.Sdk.Extension.rust-stable
command: resonance
rename-icon: icon
finish-args:
  - --device=dri
  - --share=ipc
  - --share=network
  - --socket=wayland
  - --socket=fallback-x11
modules:
  - name: resonance
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/node22/bin:/usr/lib/sdk/rust-stable/bin
      env:
        CARGO_HOME: /run/build/resonance/cargo
        npm_config_cache: /run/build/resonance/flatpak-node/npm-cache
    build-commands:
      - npm install --offline
      - npm run build:prod
      - cd src-tauri && cargo build --release --frozen
      - install -Dm755 src-tauri/target/release/resonance /app/bin/resonance
      - |
        case "$(uname -m)" in
          x86_64) v=linux-x86_64 ;;
          aarch64) v=linux-aarch_64 ;;
          *) echo "unsupported arch $(uname -m) for vendored protoc" >&2; exit 1 ;;
        esac
        install -Dm755 "$(find "$CARGO_HOME/vendor" -path "*protoc-bin-vendored-$v-*/bin/protoc" | head -n1)" /app/bin/protoc
      - install -Dm644 assets/icons/icon.svg -t /app/share/icons/hicolor/scalable/apps/
      - install -Dm644 assets/desktop/io.github.db_mobile.resonance.desktop -t /app/share/applications/
      - install -Dm644 packaging/flatpak/io.github.db_mobile.resonance.metainfo.xml -t /app/share/metainfo/
    sources:
      - type: git
        url: https://github.com/db-mobile/resonance.git
        tag: v2.12.4
        commit: 83c7431999bd1b65d3e4481f6ce0b6b8dc9f82c4
        x-checker-data:
          type: git
          tag-pattern: ^v\d+$
      - generated-sources.json
      - cargo-sources.json
